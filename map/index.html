<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国着物店舗マップ | きもの日和</title>
  <meta name="description" content="全国47都道府県の着物・呉服店舗情報。きもの日和がお届けする店舗マップ。">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;600&family=Shippori+Mincho:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --washi:       #FDFBF7;
      --washi-dark:  #F5EFE0;
      --washi-mid:   #EFE7D0;
      --amber:       #6C2F00;
      --amber-light: #B07040;
      --gold:        #F0D878;
      --text-dark:   #1A1008;
      --text-mid:    #5C4030;
      --text-light:  #9C7B5E;
      --divider:     rgba(108,47,0,.12);
      --radius:      12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--washi);
      color: var(--text-dark);
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── Nav ─────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(252,249,240,.95);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(108,47,0,.08);
      padding: 0 28px;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--amber);
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      letter-spacing: .06em;
    }
    .nav-logo img {
      height: 52px;
      mix-blend-mode: multiply;
    }
    .nav-back {
      background: var(--amber);
      color: white;
      padding: 10px 24px;
      border-radius: 24px;
      font-size: .84rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: .03em;
      transition: background .3s, transform .2s;
    }
    .nav-back:hover {
      background: #5A2700;
      transform: translateY(-1px);
    }

    /* ── Hero ────────────────── */
    .hero {
      background: linear-gradient(135deg, var(--amber) 0%, #A05030 100%);
      color: white;
      padding: 40px 20px 36px;
      text-align: center;
    }
    .hero-label {
      font-size: 11px;
      letter-spacing: 2px;
      opacity: .75;
      margin-bottom: 10px;
    }
    .hero h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 13px;
      opacity: .8;
      line-height: 1.7;
    }
    .hero-count {
      display: inline-block;
      margin-top: 14px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
    }
    .hero-count span {
      font-size: 18px;
      font-weight: 700;
      margin: 0 3px;
    }

    /* ── Search ──────────────── */
    .search-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 20px 0;
    }
    .search-box {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
      font-size: 16px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 11px 40px 11px 40px;
      border: 1px solid var(--divider);
      border-radius: var(--radius);
      background: white;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      outline: none;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--amber); }
    .search-input::placeholder { color: var(--text-light); }
    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 16px;
      display: none;
      padding: 4px;
    }
    .search-clear.visible { display: block; }

    /* ── Region Tabs ─────────── */
    .tabs-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px 20px 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs {
      display: flex;
      gap: 8px;
      width: max-content;
    }
    .tab {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border: none;
      background: var(--washi-mid);
      color: var(--text-mid);
      transition: background .18s, color .18s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .tab.active {
      background: var(--amber);
      color: white;
      font-weight: 600;
    }
    .tab:hover:not(.active) { background: var(--washi-dark); }

    /* ── Store List ──────────── */
    .list-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    /* 検索結果カウント */
    .result-count {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 16px;
    }
    .result-count strong {
      color: var(--amber);
      font-size: 16px;
    }

    /* 都道府県ヘッダー */
    .pref-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 8px;
      margin-top: 24px;
      border-bottom: 2px solid var(--amber);
    }
    .pref-header:first-child { margin-top: 0; }
    .pref-name {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--amber);
    }
    .pref-badge {
      font-size: 11px;
      color: var(--text-light);
    }

    /* 店舗カード */
    .store-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--divider);
    }
    .store-info { flex: 1; min-width: 0; }
    .store-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .store-address {
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.6;
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .store-address-icon { flex-shrink: 0; margin-top: 2px; }
    .store-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .store-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid rgba(108,47,0,.4);
      color: var(--amber);
      background: white;
      transition: background .15s;
      text-decoration: none;
    }
    .store-btn:hover { background: var(--washi-dark); }
    .store-btn svg { flex-shrink: 0; }

    /* 空状態 */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.7; }

    /* ── Footer ──────────────── */
    footer {
      background: #5d3a22;
      padding: 60px 28px 32px;
      text-align: center;
    }
    .cta-title {
      font-family: 'Shippori Mincho', serif;
      font-size: 2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 18px;
    }
    .cta-description {
      font-size: 1rem;
      line-height: 1.9;
      color: white;
      margin-bottom: 36px;
    }
    .store-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }
    .btn-store {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #000000;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity .2s;
      min-width: 200px;
    }
    .btn-store:hover { opacity: .85; }
    .btn-store-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .btn-store-text { text-align: left; line-height: 1.3; }
    .btn-store-small {
      display: block;
      font-size: .65rem;
      color: rgba(255,255,255,.75);
      font-weight: 400;
    }
    .btn-store-big {
      display: block;
      font-size: 1rem;
      font-weight: 600;
    }
    .footer-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }
    .footer-links a {
      font-size: .75rem;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      transition: color .3s;
    }
    .footer-links a:hover { color: rgba(255,255,255,.8); }
    .footer-links span {
      font-size: .75rem;
      color: rgba(255,255,255,.5);
    }

    /* ── Responsive ──────────── */
    @media (max-width: 600px) {
      .store-card { flex-direction: column; }
      .store-actions { flex-direction: row; }
    }
  </style>
</head>

// ── ロジック ────────────────────────────────────
let currentRegion = '全国';
let currentQuery  = '';

const totalCount  = document.getElementById('totalCount');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const resultCount = document.getElementById('resultCount');
const storeList   = document.getElementById('storeList');

totalCount.textContent = STORES.length;

// タブ
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentRegion = btn.dataset.region;
  render();
});

// 検索
searchInput.addEventListener('input', () => {
  currentQuery = searchInput.value.trim();
  searchClear.classList.toggle('visible', currentQuery.length > 0);
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  currentQuery = '';
  searchClear.classList.remove('visible');
  searchInput.focus();
  render();
});

function filtered() {
  return STORES.filter(s => {
    const matchRegion = currentRegion === '全国' || s.region === currentRegion;
    if (!matchRegion) return false;
    if (!currentQuery) return true;
    const q = currentQuery.toLowerCase();
    return s.name.includes(q) || s.prefecture.includes(q) || s.address.includes(q);
  });
}

function render() {
  const stores = filtered();
  resultCount.innerHTML = currentQuery
    ? `「<strong>${currentQuery}</strong>」の検索結果：<strong>${stores.length}</strong> 件`
    : `<strong>${stores.length}</strong> 店舗`;

  if (stores.length === 0) {
    storeList.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏮</div>
        <p>条件に合う店舗が見つかりませんでした。<br>別のキーワードをお試しください。</p>
      </div>`;
    return;
  }

  // 都道府県でグループ化
  const grouped = {};
  stores.forEach(s => {
    if (!grouped[s.prefecture]) grouped[s.prefecture] = [];
    grouped[s.prefecture].push(s);
  });

  storeList.innerHTML = Object.entries(grouped).map(([pref, list]) => `
    <div class="pref-header">
      <span class="pref-name">${pref}</span>
      <span class="pref-badge">${list.length}店舗</span>
    </div>
    ${list.map(s => `
      <div class="store-card">
        <div class="store-info">
          <div class="store-name">${s.name}</div>
          <div class="store-address">
            <span class="store-address-icon">📍</span>
            <span>${s.address}</span>
          </div>
        </div>
        <div class="store-actions">
          <a class="store-btn" href="${s.mapUrl}" target="_blank" rel="noopener">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
            </svg>
            マップ
          </a>
        </div>
      </div>
    `).join('')}
  `).join('');
}

render();
</script>
